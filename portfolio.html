<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Shanta Interiors</title>
    <meta name="description" content="View our complete portfolio of premium interior design projects across Bangalore and South India.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Tailwind Configuration -->
    <script src="js/config.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-sans text-slate-500 bg-white shadow-xl antialiased">

    <!-- ═══════════════════════════════════════════
         NAVIGATION (Solid Background for secondary pages)
    ═══════════════════════════════════════════ -->
    <header class="w-full z-50 py-5 text-slate-900 bg-slate-50 border-b border-slate-200">
        <div class="container mx-auto px-6 md:px-12 flex justify-between items-center">
            <a href="index.html" class="logo-text text-2xl font-serif font-bold tracking-wider transition-colors duration-300">
                SHANTA <span class="font-light text-brand-600">INTERIORS</span>
            </a>

            <nav class="hidden lg:flex space-x-8 items-center">
                <a href="index.html" class="nav-link text-xs uppercase tracking-[0.2em] font-medium hover:text-brand-600 transition-colors duration-300">Home</a>
                <a href="products.html" class="nav-link text-xs uppercase tracking-[0.2em] font-medium hover:text-brand-600 transition-colors duration-300 text-brand-600">Shop</a>
                <a href="index.html#contact" class="group relative px-7 py-2.5 border border-brand-500 text-brand-600 rounded-full text-xs uppercase tracking-[0.2em] font-semibold overflow-hidden transition-all duration-500 hover:text-slate-900">
                    <span class="absolute inset-0 bg-brand-500 scale-x-0 group-hover:scale-x-100 origin-left transition-transform duration-500"></span>
                    <span class="relative z-10">Get a Quote</span>
                </a>
            </nav>
            
            <a href="index.html" class="lg:hidden text-brand-600 text-sm uppercase tracking-widest font-medium">Home</a>
        </div>
    </header>


    <!-- ═══════════════════════════════════════════
         PORTFOLIO HEADER
    ═══════════════════════════════════════════ -->
    <section class="py-20 bg-slate-50 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-brand-500/5 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/3"></div>
        <div class="container mx-auto px-6 md:px-12 text-center relative z-10">
            <p class="text-brand-600 uppercase tracking-[0.3em] text-xs font-semibold mb-4 reveal">All Projects</p>
            <div class="section-divider mx-auto mb-6 reveal"></div>
            <h1 class="text-5xl md:text-6xl font-serif text-slate-900 mb-6 reveal">Our Complete Portfolio</h1>
            <p class="text-slate-500 max-w-2xl mx-auto reveal">A curated collection of our finest residential and commercial interior design transformations across South India.</p>
        </div>
    </section>


    <!-- ═══════════════════════════════════════════
         PORTFOLIO GRID
    ═══════════════════════════════════════════ -->
    <section class="py-16 bg-white shadow-xl relative overflow-hidden min-h-[50vh]">
        <div class="container mx-auto px-6 md:px-12">
            <!-- Gallery Grid -->
            <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Populated by JS -->
            </div>
            
            <!-- Loading State -->
            <div id="loading-spinner" class="flex justify-center py-20 text-brand-500">
                <i class="fas fa-spinner fa-spin text-4xl"></i>
            </div>
        </div>
    </section>


    <!-- ═══════════════════════════════════════════
         FOOTER
    ═══════════════════════════════════════════ -->
    <footer class="bg-slate-50 text-slate-400 py-16 border-t border-slate-200">
        <div class="container mx-auto px-6 md:px-12 text-center md:text-left flex flex-col md:flex-row justify-between items-center">
            <p>&copy; 2026 Shanta Interiors Bangalore. All rights reserved.</p>
            <div class="flex space-x-6 mt-4 md:mt-0">
                <a href="index.html#contact" class="hover:text-slate-900 transition-colors">Start a Project</a>
            </div>
        </div>
    </footer>


    <!-- ═══════════════════════════════════════════
         LIGHTBOX
    ═══════════════════════════════════════════ -->
    <div id="lightbox" class="fixed inset-0 bg-slate-50/95 backdrop-blur-xl z-[80] hidden items-center justify-center cursor-zoom-out" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-slate-900/60 hover:text-slate-900 text-3xl z-10" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
        <img id="lightbox-img" src="" alt="Portfolio Preview" class="max-w-[90vw] max-h-[85vh] object-contain rounded-lg shadow-2xl" onclick="event.stopPropagation()">
    </div>


    <!-- ═══════════════════════════════════════════
         SCRIPTS & FIREBASE
    ═══════════════════════════════════════════ -->
    <script>
    // ─── Scroll Reveal ───
    document.addEventListener('DOMContentLoaded', () => {
        const reveals = document.querySelectorAll('.reveal');
        reveals.forEach(r => r.classList.add('active'));
    });

    // ─── Lightbox ───
    function openLightbox(src) {
        const lb = document.getElementById('lightbox');
        document.getElementById('lightbox-img').src = src;
        lb.classList.remove('hidden');
        lb.classList.add('flex');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        const lb = document.getElementById('lightbox');
        lb.classList.add('hidden');
        lb.classList.remove('flex');
        document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    </script>

    <script type="module">
    // ─── Default Data (same as index.html) ───
    const DEFAULTS = [
        { id: 'p1', imageUrl: 'https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=1000&auto=format&fit=crop', title: 'The Indiranagar Villa', location: 'Bangalore • Residential', createdAt: 1 },
        { id: 'p2', imageUrl: 'https://images.unsplash.com/photo-1556912173-3bb406ef7e77?q=80&w=600&auto=format&fit=crop', title: 'Earthy Kitchen', location: 'Chennai', createdAt: 2 },
        { id: 'p3', imageUrl: 'https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?q=80&w=600&auto=format&fit=crop', title: 'Minimalist Living', location: 'Hyderabad', createdAt: 3 },
        { id: 'p4', imageUrl: 'https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=1000&auto=format&fit=crop', title: 'Jubilee Hills Penthouse', location: 'Hyderabad • Turnkey', createdAt: 4 },
    ];

    function renderPortfolio(items) {
        document.getElementById('loading-spinner').classList.add('hidden');
        const grid = document.getElementById('portfolio-grid');
        grid.innerHTML = '';

        items.sort((a, b) => b.createdAt - a.createdAt); // Newest first

        if(items.length === 0) {
            grid.innerHTML = '<p class="text-center col-span-full text-slate-400 py-10">No projects to display.</p>';
            return;
        }

        items.forEach((item, i) => {
            // Apply a stagger animation delay for the initial load
            const delay = (i % 6) * 100; 
            
            grid.innerHTML += `
            <div class="relative group img-hover-zoom cursor-pointer rounded-2xl reveal active" style="transition-delay: ${delay}ms;" onclick="openLightbox('${item.imageUrl}')">
                <img src="${item.imageUrl}" alt="${item.title}" class="w-full h-[400px] object-cover rounded-2xl">
                <div class="absolute inset-0 bg-gradient-to-t from-dark/90 via-dark/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex flex-col justify-end p-6 lg:p-8 rounded-2xl">
                    <h3 class="text-xl lg:text-2xl font-serif mb-1 text-slate-900">${item.title}</h3>
                    <p class="text-brand-600 text-xs uppercase tracking-widest">${item.location}</p>
                </div>
            </div>`;
        });
    }

    // ─── Data Loading Logic ───
    async function init() {
        try {
            // Check Firebase config availability
            const firebaseConfig = {
                apiKey: "AIzaSyDr7HTFfrH9ysDVAg2WlR6RkMdst0mMdTM",
                authDomain: "interiors-56740.firebaseapp.com",
                projectId: "interiors-56740",
                storageBucket: "interiors-56740.firebasestorage.app",
                messagingSenderId: "304781491747",
                appId: "1:304781491747:web:ef1efb994267e102197b96",
                measurementId: "G-PFNV109SP5"
            };

            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const { getFirestore, collection, onSnapshot } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'shanta-app';

            await signInAnonymously(auth);
            
            const portfolioCol = collection(db, 'artifacts', appId, 'public', 'data', 'portfolio');
            onSnapshot(portfolioCol, (snap) => {
                if (snap.empty) {
                    renderPortfolio(DEFAULTS);
                } else {
                    const items = [];
                    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                    renderPortfolio(items);
                }
            });

        } catch (e) {
            console.log('Firebase not available, using localStorage fallback.', e.message);
            const stored = localStorage.getItem('shanta_portfolio');
            renderPortfolio(stored ? JSON.parse(stored) : [...DEFAULTS]);
        }
    }

    init();
    </script>
</body>
</html>
